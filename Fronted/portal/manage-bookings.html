<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .table-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: var(--text-muted);
            border-bottom: 2px solid #f4f7fe;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f4f7fe;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.1);
            color: #856404;
        }

        .status-confirmed {
            background: rgba(23, 162, 184, 0.1);
            color: #0c5460;
        }

        .status-completed {
            background: rgba(40, 167, 69, 0.1);
            color: #155724;
        }

        .action-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 5px;
        }

        .btn-confirm {
            background: var(--info);
            color: white;
        }

        .btn-complete {
            background: var(--success);
            color: white;
        }
    </style>
</head>

<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-section">
            <h2>VINNY KJ</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="manage-orders.html"><i class="fas fa-shopping-cart"></i> Manage Orders</a></li>
            <li><a href="manage-bookings.html" class="active"><i class="fas fa-calendar-alt"></i> Manage Bookings</a>
            </li>
            <li><a href="manage-products.html"><i class="fas fa-box"></i> Stock Management</a></li>
            <li><a href="/admin/" target="_blank"><i class="fas fa-cogs"></i> Django Admin</a></li>
            <li><a href="/"><i class="fas fa-external-link-alt"></i> View Website</a></li>
            <li style="margin-top: auto;"><a href="#" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <div class="welcome-msg">
                <h1>Manage Bookings</h1>
                <p>Handle service appointments and scheduling.</p>
            </div>
        </header>

        <div class="table-container">
            <div class="chart-header">
                <h2>Upcoming Bookings</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Service</th>
                        <th>Date & Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <!-- Data loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchBookings);

        async function fetchBookings() {
            try {
                const response = await fetch('/api/bookings/', {
                    headers: getAuthHeaders()
                });
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) logout();
                    throw new Error('Failed to fetch');
                }
                const bookings = await response.json();
                renderBookings(bookings);
            } catch (error) {
                console.error('Error:', error);
                renderMockBookings();
            }
        }

        function renderBookings(bookings) {
            const tbody = document.getElementById('bookingsTableBody');
            tbody.innerHTML = bookings.map(booking => `
                <tr>
                    <td>${booking.full_name}</td>
                    <td>${booking.services_name || 'Service'}</td>
                    <td>${booking.booking_date} at ${booking.booking_time}</td>
                    <td><span class="status-badge status-${booking.status}">${booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}</span></td>
                    <td>
                        ${booking.status === 'pending' ? `<button onclick="updateStatus(this, ${booking.id}, 'confirm')" class="action-btn btn-confirm">Confirm</button>` : ''}
                        ${booking.status === 'confirmed' ? `<button onclick="updateStatus(this, ${booking.id}, 'complete')" class="action-btn btn-complete">Complete</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(btn, id, action) {
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = action === 'confirm' ? 'Confirming...' : 'Completing...';

            try {
                const res = await fetch(`/api/bookings/${id}/${action}/`, { 
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (res.ok) {
                    const label = action === 'confirm' ? 'confirmed' : 'completed';
                    showNotification(`Booking ${label} successfully! Confirmation email sent to client.`, 'success');
                    fetchBookings();
                } else {
                    showNotification(data.error || 'Action failed', 'error');
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (error) {
                showNotification('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function showNotification(message, type) {
            const existing = document.querySelector('.portal-notification');
            if (existing) existing.remove();

            const div = document.createElement('div');
            div.className = 'portal-notification';
            div.style.cssText = `
                position: fixed; top: 20px; right: 20px; z-index: 9999;
                padding: 14px 24px; border-radius: 12px; font-weight: 600;
                font-size: 0.9rem; max-width: 400px; box-shadow: 0 8px 25px rgba(0,0,0,0.15);
                animation: slideIn 0.3s ease;
                \${type === 'success'
                    ? 'background: #d4edda; color: #155724; border: 1px solid #c3e6cb;'
                    : 'background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;'}
            `;
            div.innerText = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function renderMockBookings() {
            const mock = [
                { id: 1, full_name: 'Alice Brown', services_name: 'Full Detail', booking_date: '2023-11-01', booking_time: '10:00', status: 'pending' },
                { id: 2, full_name: 'Bob Wilson', services_name: 'Oil Change', booking_date: '2023-11-02', booking_time: '14:30', status: 'confirmed' }
            ];
            renderBookings(mock);
        }
    </script>
    <script>
        (function () {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
            toggle.addEventListener('click', function () {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            });
            overlay.addEventListener('click', closeSidebar);
        })();
    </script>
</body>

</html>

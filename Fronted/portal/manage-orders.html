<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | Admin Portal</title>
    <script src="js/auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .table-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid #f4f7fe;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f4f7fe;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.1);
            color: #856404;
        }

        .status-paid {
            background: rgba(40, 167, 69, 0.1);
            color: #155724;
        }

        .status-cancelled {
            background: rgba(220, 53, 69, 0.1);
            color: #721c24;
        }

        .status-failed {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }

        .status-completed {
            background: rgba(40, 167, 69, 0.1);
            color: #155724;
        }

        .status-delivery {
            background: rgba(0, 123, 255, 0.1);
            color: #004085;
        }

        .detail-row {
            display: none;
            background: #f8fafc;
        }

        .detail-content {
            padding: 15px 40px;
            font-size: 0.95rem;
        }

        .detail-table {
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
            border: 1px solid #edf2f7;
            border-radius: 8px;
            overflow: hidden;
        }

        .items-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .items-list li {
            padding: 8px 0;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
        }

        .items-list li:last-child {
            border-bottom: none;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 5px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .toggle-btn.active {
            transform: rotate(180deg);
        }

        .action-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 5px;
            transition: 0.2s;
        }

        .btn-view {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-update {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body style="display: none;">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-section">
            <h2>VINNY KJ</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="manage-orders.html" class="active"><i class="fas fa-shopping-cart"></i> Manage Orders</a></li>
            <li><a href="manage-bookings.html"><i class="fas fa-calendar-alt"></i> Manage Bookings</a></li>
            <li><a href="manage-products.html"><i class="fas fa-box"></i> Stock Management</a></li>
            <li><a href="/admin/api/contactmessage/" target="_blank"><i class="fas fa-envelope"></i> Contact Messages</a></li>
            <li><a href="/admin/" target="_blank"><i class="fas fa-cogs"></i> Django Admin</a></li>
            <li><a href="/"><i class="fas fa-external-link-alt"></i> View Website</a></li>
            <li style="margin-top: auto; border-top: 1px solid #edf2f7; padding-top: 10px;">
                <a href="#" class="logout-btn" style="color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <div class="welcome-msg">
                <h1>Manage Orders</h1>
                <p>Track and update customer orders.</p>
            </div>
        </header>

        <div class="table-container">
            <div class="chart-header">
                <h2>Recent Orders</h2>
                <div class="search-box">
                    <input type="text" id="orderSearch" placeholder="Search orders..."
                        style="padding: 10px; border-radius: 10px; border: 1px solid #edf2f7;">
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Total Price</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <!-- Data loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchOrders);

        async function fetchOrders() {
            try {
                const response = await fetch('/api/orders/', {
                    headers: getAuthHeaders()
                });
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) logout();
                    throw new Error('Failed to fetch');
                }
                const orders = await response.json();
                renderOrders(orders);
            } catch (error) {
                console.error('Error:', error);
                renderMockOrders();
            }
        }

        function getStatusInfo(order) {
            if (order.is_cancelled) return { label: 'Cancelled', cls: 'status-cancelled' };
            if (order.is_failed) return { label: 'Failed', cls: 'status-failed' };
            if (order.is_delivered) return { label: 'Delivered', cls: 'status-completed' };
            if (order.is_paid) return { label: 'Paid', cls: 'status-paid' };
            if (order.payment_method === 'Delivery') {
                return order.is_confirmed 
                    ? { label: 'Confirmed (COD)', cls: 'status-delivery' }
                    : { label: 'Pending Confirmation', cls: 'status-pending' };
            }
            return { label: 'Pending', cls: 'status-pending' };
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = orders.map(order => {
                const st = getStatusInfo(order);
                const showDeliver = order.is_paid && !order.is_delivered && !order.is_cancelled;
                
                const itemsHtml = order.items && order.items.length > 0 
                    ? `<ul class="items-list">
                        ${order.items.map(item => `
                            <li>
                                <span><strong>${item.quantity}x</strong> ${item.product.name}</span>
                                <span class="text-muted">KES ${item.price_at_order}</span>
                            </li>
                        `).join('')}
                       </ul>`
                    : '<p class="text-muted">No items found.</p>';

                return `
                <tr>
                    <td>
                        <button class="toggle-btn" onclick="toggleDetails(this, ${order.id})">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        #${order.id}
                    </td>
                    <td>${order.full_name}</td>
                    <td>KES ${order.total_price}</td>
                    <td><span class="status-badge ${st.cls}">${st.label}</span></td>
                    <td>${new Date(order.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="action-btn btn-view" onclick="viewOrder(${order.id})"><i class="fas fa-eye"></i></button>
                        ${order.payment_method === 'Delivery' && !order.is_confirmed && !order.is_cancelled 
                            ? `<button class="action-btn btn-update" onclick="confirmOrder(this, ${order.id})"><i class="fas fa-check"></i> Confirm</button>` 
                            : ''}
                        ${showDeliver || (order.payment_method === 'Delivery' && order.is_confirmed && !order.is_delivered && !order.is_cancelled)
                            ? `<button class="action-btn btn-update" onclick="markDelivered(this, ${order.id})"><i class="fas fa-truck"></i> Deliver</button>` 
                            : ''}
                    </td>
                </tr>
                <tr id="details-${order.id}" class="detail-row">
                    <td colspan="6">
                        <div class="detail-content">
                            <h6>Order Details:</h6>
                            <div class="mb-2">
                                <strong>Payment Method:</strong> ${order.payment_method || 'M-Pesa'}
                            </div>
                            <div class="mb-2">
                                <strong>Address:</strong> ${order.street_address || 'N/A'}, ${order.estate || ''}
                            </div>
                            <div class="mb-2">
                                <strong>Contact:</strong> ${order.phone_number || 'N/A'} ${order.email ? `(${order.email})` : ''}
                            </div>
                            <hr>
                            <h6>Products:</h6>
                            ${itemsHtml}
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function toggleDetails(btn, id) {
            const detailsRow = document.getElementById(`details-${id}`);
            const icon = btn.querySelector('i');
            if (detailsRow.style.display === 'table-row') {
                detailsRow.style.display = 'none';
                icon.className = 'fas fa-chevron-down';
            } else {
                detailsRow.style.display = 'table-row';
                icon.className = 'fas fa-chevron-up';
            }
        }

        function viewOrder(id) {
            window.open('/admin/api/order/' + id + '/change/', '_blank');
        }

        async function confirmOrder(btn, id) {
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Confirming...';
            try {
                const res = await fetch(`/api/orders/${id}/confirm/`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                if (res.ok) {
                    showNotification('Order confirmed!', 'success');
                    fetchOrders();
                } else {
                    const data = await res.json();
                    showNotification(data.error || 'Action failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = orig;
                }
            } catch (e) {
                showNotification('Network error', 'error');
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        }

        async function markDelivered(btn, id) {
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Delivering...';

            try {
                const res = await fetch(`/api/orders/${id}/deliver/`, { 
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                if (res.ok) {
                    showNotification('Order marked as delivered! Email sent to customer.', 'success');
                    fetchOrders();
                } else {
                    showNotification(data.error || 'Action failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = orig;
                }
            } catch (e) {
                showNotification('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        }

        function showNotification(message, type) {
            const existing = document.querySelector('.portal-notification');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = 'portal-notification';
            div.style.cssText = `
                position: fixed; top: 20px; right: 20px; z-index: 9999;
                padding: 14px 24px; border-radius: 12px; font-weight: 600;
                font-size: 0.9rem; max-width: 400px; box-shadow: 0 8px 25px rgba(0,0,0,0.15);
                ${type === 'success'
                    ? 'background: #d4edda; color: #155724; border: 1px solid #c3e6cb;'
                    : 'background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;'}
            `;
            div.innerText = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function renderMockOrders() {
            const mockData = [
                { 
                    id: 101, full_name: 'John Doe', total_price: '4,500', is_paid: true, is_delivered: false, is_cancelled: false, 
                    created_at: new Date(), payment_method: 'M-Pesa', phone_number: '0712345678', street_address: 'Baricho Road', estate: 'Nairobi',
                    items: [{ quantity: 1, product: { name: 'Full Tinting Service' }, price_at_order: '4,500' }]
                },
                { 
                    id: 102, full_name: 'Jane Smith', total_price: '12,000', is_paid: false, is_delivered: false, is_cancelled: false, 
                    created_at: new Date(), payment_method: 'Delivery', phone_number: '0722334455', street_address: 'Mombasa Road', estate: 'South C',
                    is_confirmed: false,
                    items: [{ quantity: 2, product: { name: 'Carbon Film Roll' }, price_at_order: '6,000' }]
                }
            ];
            renderOrders(mockData);
        }
    </script>
    <script>
        (function () {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
            toggle.addEventListener('click', function () {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            });
            overlay.addEventListener('click', closeSidebar);
        })();
    </script>
</body>

</html>

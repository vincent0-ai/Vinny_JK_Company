<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Vinny KJ Auto</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Auth Check (Blocking) -->
    <script src="js/auth.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f7fa;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            margin-bottom: 30px;
        }

        .login-logo h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #ff3333;
            letter-spacing: 1px;
            margin: 0;
        }

        .login-logo p {
            color: #6c757d;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            background-color: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff3333;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 51, 51, 0.1);
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: #888;
            transition: color 0.3s;
        }

        .form-group input:focus+i {
            color: #ff3333;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #ff3333;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background-color: #e60000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 0, 0, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: left;
        }
    </style>
</head>

<body style="display: none;">

    <div class="login-container">
        <div class="login-logo">
            <h2>VINNY KJ</h2>
            <p>Admin Portal Login</p>
        </div>

        <div id="login-error" class="error-message">
            Invalid username or password.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter admin username" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="btn-login" id="login-btn">
                <span>Login</span> <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="margin-top: 30px; display: flex; justify-content: center;">
            <a href="../index.html"
                style="color: #6c757d; font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.3s;">
                <i class="fas fa-arrow-left"></i> Back to Main Site
            </a>
        </div>
    </div>

</body>

</html>
